name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis_b:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis_c:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: bpc_test
          POSTGRES_USER: bpc_test
          POSTGRES_PASSWORD: bpc-test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bpc_test -d bpc_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres_b:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: bpc_test
          POSTGRES_USER: bpc_test
          POSTGRES_PASSWORD: bpc-test-only-password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U bpc_test -d bpc_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres_control:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: bpc_test
          POSTGRES_USER: bpc_test
          POSTGRES_PASSWORD: bpc-test-only-password
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U bpc_test -d bpc_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      BPC_TEST_REDIS_URL: redis://127.0.0.1:6379
      BPC_TEST_REDIS_URLS: redis://127.0.0.1:6379,redis://127.0.0.1:6380,redis://127.0.0.1:6381
      BPC_TEST_POSTGRES_URL: postgresql://bpc_test:bpc-test-only-password@127.0.0.1:5432/bpc_test
      BPC_TEST_POSTGRES_B_URL: postgresql://bpc_test:bpc-test-only-password@127.0.0.1:5433/bpc_test
      BPC_TEST_POSTGRES_CONTROL_URL: postgresql://bpc_test:bpc-test-only-password@127.0.0.1:5434/bpc_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Configure durable Redis fence quorum
        run: node --input-type=module -e "import Redis from 'ioredis'; for (const port of [6379,6380,6381]) { const r=new Redis(port,'127.0.0.1'); await r.config('SET','appendonly','yes'); await r.config('SET','appendfsync','always'); r.disconnect(); }"
      - run: python -m pip install -e packages/bpc-client
      - run: npm run build
      - run: npm run test:pack
      - run: npm test
      - run: npm run test:adversarial
      - run: npm run test:interop
      - run: npm run test:redis
      - run: npm run test:postgres
      # HA durable-outbox (#16) real-PG evidence — the script throws if
      # BPC_TEST_POSTGRES_URL is unset, so this step FAILS rather than silently
      # skipping (asserts the real-PG tests actually executed).
      - run: npm run test:postgres:ha
      # Independent-state mechanism evidence only. The drill uses a labeled
      # test-only in-process adapter and makes no network/HA/promotion claim.
      - run: npm run test:postgres:two-pg
      # Frozen #16 acceptance. Uses A/B/control PostgreSQL clusters, a signed
      # three-member durable Redis quorum, a live partition, and SIGKILL.
      # Required env is validated by the script, so this step fails, never skips.
      - run: npm run test:ha:acceptance
      - run: npm audit --omit=dev

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e "packages/bpc-client[dev]" -e "packages/bpc-server[all,dev]"
      - run: python -m pytest packages/bpc-client/tests -q
      - run: python -m pytest packages/bpc-server/tests -q
