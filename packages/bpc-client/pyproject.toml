[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bpc-client"
version = "1.0.0"
description = "Python client SDK for the BPC (Bound Pair Credentials) pair-authorized request-signing protocol"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "SelfConnect", email = "hello@selfconnect.ai" }]
keywords = ["bpc", "authentication", "cryptography", "ecdsa", "api-security", "selfconnect"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Topic :: Internet :: WWW/HTTP",
]
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.24.0",
    "cryptography>=41.0.0",
    "click>=8.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "respx>=0.20"]

[project.scripts]
bpc = "bpc_client.cli.main:main"
bpc-mcp = "bpc_client.mcp.server:main"

[project.urls]
Homepage = "https://selfconnect.ai"
Repository = "https://github.com/rblake2320/bpc-protocol"
Documentation = "https://github.com/rblake2320/bpc-protocol/tree/main/packages/bpc-client"

[tool.hatch.build.targets.wheel]
packages = ["bpc_client"]

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
