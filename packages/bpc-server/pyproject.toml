[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bpc-server"
version = "1.0.0"
description = "Python server-side middleware for BPC (Bound Pair Credentials) — FastAPI and Flask request verification"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "SelfConnect", email = "hello@selfconnect.ai" }]
keywords = ["bpc", "authentication", "cryptography", "fastapi", "flask", "middleware", "selfconnect"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Topic :: Internet :: WWW/HTTP",
]
requires-python = ">=3.9"
dependencies = [
    "cryptography>=41.0.0",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0", "starlette>=0.27.0"]
flask = ["flask>=2.0.0"]
all = ["fastapi>=0.100.0", "starlette>=0.27.0", "flask>=2.0.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "httpx>=0.24.0", "fastapi>=0.100.0", "flask>=2.0.0", "bpc-client>=1.0.0"]

[project.urls]
Homepage = "https://selfconnect.ai"
Repository = "https://github.com/rblake2320/bpc-protocol"
Documentation = "https://github.com/rblake2320/bpc-protocol/tree/main/packages/bpc-server"

[tool.hatch.build.targets.wheel]
packages = ["bpc_server"]

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
